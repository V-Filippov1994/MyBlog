services:
  backend:
    build: .
    container_name: myblog_backend
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    command: >
      bash -c "
      python -m uvicorn my_blog.asgi:application --host 0.0.0.0 --port 8000 --reload
      "

  db:
    image: postgres:15
    container_name: myblog_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: