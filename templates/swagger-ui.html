<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Blog API - Swagger UI</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css" />
    <style>
        .topbar {
            background-color: #1a1a2e;
            padding: 10px;
        }
        .auth-buttons {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }
        .github-btn {
            background-color: #24292e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.3s;
        }
        .github-btn:hover {
            background-color: #2c3e50;
        }
        .logout-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: background-color 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .logout-btn:hover {
            background-color: #c82333;
        }
        .auth-status {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background-color: #28a745;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            display: none;
        }
        .auth-status.error {
            background-color: #dc3545;
        }
        .auth-status.info {
            background-color: #17a2b8;
        }
        img {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>
    <div class="auth-buttons">
        <button class="github-btn" id="githubLoginBtn">
            Войти с помощью GitHub
        </button>
        <a href="/api/auth/logout/" class="logout-btn" id="logoutBtn" style="display: none;">
            Выйти
        </a>
    </div>
    <div class="auth-status" id="authStatus"></div>

    <div id="swagger-ui"></div>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
    <script>
        function getCSRFToken() {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, 10) === 'csrftoken=') {
                        cookieValue = decodeURIComponent(cookie.substring(10));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        async function checkAuthStatus() {
            try {
                const response = await fetch('/api/auth/status/', {
                    credentials: 'include',
                    headers: {
                        'X-CSRFToken': getCSRFToken()
                    }
                });
                const data = await response.json();
                if (data.authenticated) {
                    document.getElementById('githubLoginBtn').style.display = 'none';
                    document.getElementById('logoutBtn').style.display = 'flex';
                    showAuthStatus(`Вы вошли как ${data.username}`, false);
                } else {
                    document.getElementById('githubLoginBtn').style.display = 'flex';
                    document.getElementById('logoutBtn').style.display = 'none';
                    showAuthStatus('Не авторизован', true);
                }
                return data.authenticated;
            } catch (error) {
                console.error('Auth check failed:', error);
                return false;
            }
        }
        function showAuthStatus(message, isError) {
            const statusDiv = document.getElementById('authStatus');
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';
            if (isError) {
                statusDiv.classList.add('error');
                statusDiv.classList.remove('info');
            } else {
                statusDiv.classList.remove('error');
                statusDiv.classList.add('info');
            }
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
        }

        window.onload = function() {
            window.ui = SwaggerUIBundle({
                url: "/api/schema/",
                dom_id: '#swagger-ui',
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                layout: "BaseLayout",
                persistAuthorization: true,
                requestInterceptor: (req) => {
                    req.credentials = 'include';
                    const csrfToken = getCSRFToken();
                    if (csrfToken) {
                        req.headers['X-CSRFToken'] = csrfToken;
                    }
                    return req;
                }
            });
            setTimeout(checkAuthStatus, 500);
            setInterval(checkAuthStatus, 30000);
        };

        document.getElementById('githubLoginBtn').addEventListener('click', async function() {
            try {
                const response = await fetch('/api/auth/github/login/', {
                    credentials: 'include'
                });
                const data = await response.json();
                if (data.authorization_url) {
                    window.location.href = data.authorization_url;
                } else {
                    showAuthStatus('Ошибка авторизации', true);
                }
            } catch (error) {
                showAuthStatus('Ошибка соединения с сервером', true);
            }
        });
    </script>
</body>
</html>
